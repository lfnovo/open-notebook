name: ci-open-notebook

on:
  pull_request:
    branches:
      - main
      - feature/open-notebook

jobs:
  test-open-notebook-prototype:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: open-notebook/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          EMBEDDING_PROVIDER: hash
          EMBEDDING_MODEL: hash
          MODEL_PROVIDER: local
        run: pytest tests -q
