name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - desktop-v*

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev pkg-config patchelf xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: Open Notebook Desktop ${{ github.ref_name }}
          releaseBody: |
            Linux desktop launcher for Open Notebook.

            **Downloads:**
            - **AppImage** — portable, recommended (in-app updates)
            - **.deb** — Debian/Ubuntu/Linux Mint

            Docker must be installed separately. On first launch the app downloads the official Open Notebook images.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: --bundles appimage deb
