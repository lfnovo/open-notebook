services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root
    ports:
      - "8000:8000"
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: always

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kavach-kafka
    ports:
      - "9093:9093"
      - "29093:29093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:29094"
      KAFKA_LISTENERS: "CONTROLLER://localhost:29094,PLAINTEXT://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:29093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: always

  open_notebook:
    build:
      context: .
      dockerfile: Dockerfile

    # ✅ Intel GPU (VAAPI)
    devices:
      - "/dev/dri/renderD128:/dev/dri/renderD128"
      - "/dev/dri/renderD129:/dev/dri/renderD129"
    group_add:
      - video
      - render
      

    ports:
      - "3001:8502"
      - "8502:8502"
      - "5055:5055"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=change-me-to-a-secret-string
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_API_URL=http://host.docker.internal:11434
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9093
      - GIT_PYTHON_REFRESH=quiet
      - LIBVA_DRIVER_NAME=iHD
      - LIBVA_DRIVERS_PATH=/usr/lib/x86_64-linux-gnu/dri
      - DRI_PRIME=0

    volumes:
      - ./notebook_data:/app/data

    depends_on:
      - surrealdb
      - kafka

    restart: always

volumes:
  kafka_data: